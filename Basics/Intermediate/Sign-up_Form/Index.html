<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="script.js" defer></script>
</head>

<body>
    <div class="left_section">
        <div class="logo_bar">
            <img src="odin-lined.png" alt="odin_logo">
            <p id="logo_name">ODIN</p>
        </div>
    </div>

    <div class="right_section">
        <div class="headings">
            <div class="head_1">
                This is not a real online service! You know you need something
                like this in your life to help you realize your deepest dreams.<br>
                <span>Sign up <em>now</em> to get started.</span>
            </div>
            <div class="head_2">
                You <em>know</em> you want to.
            </div>
        </div>
        <div class="inputs">
            <div id="form_heading">Let's do this!</div>
            <form>


                <div>
                    <div class="input_field">
                        <label for="first_name">FIRST NAME</label>
                        <input type="text" id="first_name" name="first_name">
                    </div>

                    <div class="input_field">
                        <label for="last_name">LAST NAME</label>
                        <input type="text" id="last_name" name="last_name">
                    </div>
                </div>

                <div>
                    <div class="input_field">
                        <label for="email">EMAIL</label>
                        <input type="email" id="email" name="email">
                    </div>

                    <div class="input_field">
                        <label for="phone">PHONE NUMBER</label>
                        <input type="tel" id="phone" name="phone_number">
                    </div>
                </div>

                <div>
                    <div class="input_field">
                        <label for="password">PASSWORD</label>
                        <input type="password" id="password" name="password" required>
                    </div>

                    <div class="input_field">
                        <label for="con_pass">CONFIRM PASSWORD</label>
                        <input type="password" id="con_pass" name="con_pass" required>
                    </div>
                </div>


            </form>

        </div>
        <div class="CTA">
            <button type="button">Create Account</button>
            <div id="login_link">Already have an account? <a href="">Log in</a></div>
        </div>
    </div>
</body>

</html>
