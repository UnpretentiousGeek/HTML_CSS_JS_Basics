<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>

<!-- The DOM -->

<body>
    <div class="content">
        <h1>My Library</h1>
        <button command="show-modal" commandfor="add-form">Add Book</button>

        <dialog id="add-form">
            
            <form id="book-details">
                <div>
                    <label for="book_name">Book Name</label>
                    <input type="text" name="book_name" id="book_name" required>
                </div>

                <div>
                    <label for="author">Author</label>
                    <input type="text" name="author" id="author" required>
                </div>

                <div>
                    <label for="pages">Pages</label>
                    <input type="number" name="pages" id="pages" required>
                </div>

                <div>
                    <label for="read">Read</label>
                    <input type="radio" name="read" value="read">
                </div>

                <div>
                    <label for="not_read">Not Read</label>
                <input type="radio" name="read" value="not_read">
                </div>
                
                <button type="submit">Submit</button>  
            </form>
            <button commandfor="add-form" command="close">Close</button>
        </dialog>
        <div class="books">

        </div>
    </div>
</body>


</html>
