<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Document</title>
</head>

<body>
    <img src="#">
    <script>
        const img = document.querySelector('img');

        async function getCats() {
            try {
                const response = await fetch('https://api.giphy.com/v1/gifs/translate?api_key=a9OcEbTBEoHoQmpMAcjHF00vqjzwnjkT&s=cats');
                const catData = await response.json();
                img.src = catData.data.images.original.url;
            } catch (error) {
                console.error(error);
            }
        }
        getCats();
    </script>



</body>

</html>
